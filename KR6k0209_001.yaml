body:
  text: 天台沙門釋允堪述稽首南山教主西明律師智廓難量位高莫測外示聲聞奇相內冥菩薩圓修洋洋馳譽於五天藹藹流芳於千古早自發揮祕藏撰述彝章英辭而間綴珠瓊光逾衆寶奧義而濬開川瀆量等沖溟決通四分雄詮親感諸天顯證尋以清機化滿遽遷壇谷室中妙利功圓遂託率陀宮內我恨生當澆季不遇真慈濫傳三行微言寧五篇深旨望座蓮而既遠難親師子之音思法乳以空頻但守嬰兒之困今則應鍾俄屆諱日斯臨座列香華槃盈蘋藻庶同禴祭式表爾思仰追罔極之恩少薦非馨之禮遠希慈眼俯察虔心彈指而來降道場神功靡忒舉足而不離寶所妙用輒露精誠願垂昭鑒一心奉請南山教主澄照大師惟願降臨道場受我供養皓月麗空則衆星隱耀聖師出世則羣智絶言繼揚象扇之風宏著虬文之訓皇王拜首天人翊靈實波離儔荷如來任一心頂禮隋文治世京華降誕時身南山尊者下皆倣此後和同前神州一類機緣熟大士分身感赴來月應澄瀾信不差谷酬清響曾無失竺賢指出真僧迹姚氏欣懷聖者蹤誕慶佳辰與佛同應知識作空王使一心頂禮日嚴精舍棄家入道時身跡寄搢紳為令子操懷松柏異常童弱齡搖筆著高文緑髮辭家厭浮世內典閲窮千日內妙經誦徹兩旬中仰茲勇鋭早超羣豈獨當年推義少一心頂禮靈壇求戒預祈冥感時身尸羅欲受彰靈感舍利先求降寶函確爾將圓七晝期鏗然俄向遙空墜金莖滴露清難比銀漢流星勢可同吳地于今尚有緣塔婆夜夜祥光起一心頂禮京畿請業聽尋律藏時身佛法于時嗟壅塞律筵無處可依承艱辛得造首師門研考便通金口義鈿軸曉開雲閣靜紗燈夜映竹堂深毗尼殘缺自茲明猶歎未能心盡證一心頂禮紵麻蘭若操觚撰鈔時身跡隱終南當絶頂雲深蘭若寂無人會通羣部補今宗搜駮諸師成了義三行旨清秋月皎十門辭爛曉霞明反光九代信難如後世素師空擬議一心頂禮九旬精進行般舟三昧時身般舟深定功推大菩薩真機力可修萬境虗融泯外緣一心圓證妄餘念香飄雲室迎秋令聲遞林風入夜清三昧成時秖自知十方佛在空中立一心頂禮西明行道天神捧足時身寂寂花宮當夜午寥寥月殿尚經行心緣真境頓忘勞足趺空階寧有害捷疾現身親捧接那吒受敕暗相隨佛牙從此獻師來沒付文綱今在世一心頂禮龍天依奉講楞伽授戒時身師居物表間揮麈龍化人形來聽經法語頻揚吼石音戒身密授浮囊意南天毗勒供甘露西竺那提請象胥如斯解行世稀逢幽顯咸思歸盛德一心頂禮京南澧福築壇應法時身里稱遵善當靈壤鄉曰清官是淨墟遂築靈壇向紺園仰模良制資先聖明明珠釜連高頂粲粲星神布兩層重受雲奔來四方功成因感賓頭禮一心頂禮功成示寂往生兜率時身棘林香好從天獻覩史宮奇待聖來補處爰親慈氏尊下生將紹波離任煥爛幡幢搖彩日清泠歌唄響層宵斂容端坐寂無聲荷法千徒流血淚至心懺悔我及十方法界一切衆生無明風鼓心源妄識波騰性海遂成起滅乃受漂淪四生流轉無窮衆苦嬰纏莫盡不聞正法何殊三億之徒或染邪風豈異六師之黨永招幽暗長處愚蒙塵境攀緣若癡猿之得樹欲情競騖猶逸象之無鈎縱遇良師詎懷深信致使衣珠空繫都忘知覺之心宅寶徒盈寧濟困窮之厄何緣今日偶得出家披水田衣納塵沙戒值能仁遺訓遇終南寶章不思義路全迷未通幽邃疑冰正結罔構淵深反繄測海之知妄恃挈瓶之智輕陵先覺排斥真乘將實教為憑虗以權宗為戲論慢幢高竪愛網宏張居屏為非肯畏幽靈而掃跡逢人斂相苟求邪利以資身不義常行無慚永坐諒作福田荊棘信為佛日煙雲三乘觀慧闕修十聚罪愆深隱如斯釁戾量等虗空對萬德以披陳向四依而發露誓除後犯永絶前非普承智慧之光頓釋雪霜之非懺悔已至心歸命頂禮下皆倣此至心勸請能仁制略為初訓身子虔誠乞廣談我今遍請聖賢師先向剎塵揚律藏至心隨喜初發道心諸佛子終登妙果大慈尊所有熏修出世緣我今一一皆隨喜至心回向戒定慧中曾習行聞思修內或生因回向真如法界中普滋羣有霑常樂至心發願鵝珠誓共行慈利草繫期同護戒根遮性無邊誓等持常遊佛道開禪智右真悟律師第一章云丹徒降誕者按行狀云大師在京華生長即京兆府而云長城丹徒蓋指祖宗所出非生處也第八章按禮記辨四方語各有其職東方曰寄南方曰象西方曰狄鞮音蹄北方曰譯周禮謂象胥乃通四方之言胥字上聲呼之今作平聲誤矣若作上聲則音律不便今對西竺宜云狄鞮且仍舊貫學者不可不知
